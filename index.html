<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PramodCody</title>
    <link rel="prefetch" href="assets/Kids_Classium.apk">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- website top panel -->
    <div id="top_panel">
        <button id="menu_button">
            <img src="assets/menu_button_light_mode.png" alt="menu_button">
        </button>
        <h1 id="pramodcody_logo">PramodCody</h1> <!--pramodcody logo -->
    </div>
    

    <!-- website default home -->
    <div id="home">

        <div id="project_topic">
            <img src="assets/kids_classium_logo.png" alt="kids_classium_logo">
            <h2>Kids_Classium</h2>
        </div>

        <div id="download_apk">
            <h3>click here to download kids_classium.apk</h3>
            <button id="download_apk_button">
                <img src="assets/download_button.png" alt="download_button">
            </button>
        </div>
        
        <!--kids_classium games screenshots-->
        <div id="classium_screenshots">
            <h2>SCREENSHOTS:</h2>
            <img src="assets/screenshot1.webp" alt="screenshot1">
            <img src="assets/screenshot2.webp" alt="screenshot2">
            <img src="assets/screenshot3.webp" alt="screenshot3">
            <img src="assets/screenshot4.webp" alt="screenshot4">
            <img src="assets/screenshot5.webp" alt="screenshot5">
            <img src="assets/screenshot6.webp" alt="screenshot6">
            <img src="assets/screenshot7.webp" alt="screenshot7">
        </div>

    </div>

    
    <script src="script.js"> </script>
</body>
</html>
